[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cram-ai"
version = "0.1.0"
description = "Cut AI coding token costs by 98% with curated .ai-context/ files"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = [
    "anthropic>=0.40.0",
]

[project.optional-dependencies]
multi-provider = ["litellm>=1.40.0"]
dev = ["pytest>=8.0"]

[project.scripts]
cram = "cram.cli:main"

[project.urls]
Homepage = "https://github.com/vishbay/cram-ai"
Repository = "https://github.com/vishbay/cram-ai"

[tool.setuptools.packages.find]
include = ["cram*"]
