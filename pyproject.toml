[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cram-ai"
version = "0.1.0"
description = "Cut AI coding token costs by 98% with curated .ai-context/ files"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = [
    "anthropic>=0.40.0",
    "tomli>=2.0; python_version < '3.11'",
]

[project.optional-dependencies]
multi-provider = ["litellm>=1.40.0"]
mac = ["rumps>=0.4.0"]
tray = ["pystray>=0.19.0", "pillow>=10.0", "pywebview>=5.0", "flask>=3.0"]
dev = ["pytest>=8.0"]

[project.scripts]
cram = "cram.cli:main"
cram-menu = "cram.tray:main"
cram-autostart = "cram.autostart:main"

[project.urls]
Homepage = "https://github.com/vishbay/cram-ai"
Repository = "https://github.com/vishbay/cram-ai"

[tool.setuptools.packages.find]
include = ["cram*"]
